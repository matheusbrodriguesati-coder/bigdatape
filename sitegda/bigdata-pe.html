const { useState, useEffect, useRef } = React;

function resolveLucideIconName(name) {
  if (!name) return name;
  if (lucide.icons?.[name] || lucide[name]) return name;
  return name
    .split(/[-_]/g)
    .map((part) => part.charAt(0).toUpperCase() + part.slice(1))
    .join('');
}

function Icon({ name, className = "" }) {
  const ref = useRef(null);
  useEffect(() => {
    const resolvedName = resolveLucideIconName(name);
    const node = lucide.icons?.[resolvedName] || lucide[resolvedName] || lucide.icons?.[name] || lucide[name];
    if (!node || !ref.current) return;
    ref.current.innerHTML = "";
    const el = lucide.createElement(node);
    el.setAttribute("class", "lucide " + className);
    ref.current.appendChild(el);
  }, [name, className]);
  return <span ref={ref} className="inline-flex shrink-0" />;
}

function TypewriterCode({ segments, typingSpeed=24, className="", startDelay=400, restartDelay=3000, repeat=true }) {

  const [segIndex,setSegIndex]=useState(0);
  const [charIndex,setCharIndex]=useState(0);
  const [hasStarted,setHasStarted]=useState(false);
  const [isComplete,setIsComplete]=useState(false);
  const containerRef=useRef(null);

  useEffect(()=>{
    const el=containerRef.current; if(!el) return;
    const ob=new IntersectionObserver(([e])=>{ if(e.isIntersecting && !hasStarted) setHasStarted(true); },{threshold:.25});
    ob.observe(el); return ()=>ob.disconnect();
  },[hasStarted]);

  useEffect(()=>{
    if(!hasStarted) return;
    if(isComplete) return;
    const current = segments[segIndex] ? segments[segIndex].text : "";
    if(charIndex === 0 && segIndex === 0) {
      // initial delay before first char
      const t = setTimeout(()=> setCharIndex(1), startDelay);
      return ()=>clearTimeout(t);
    }
    if(charIndex < current.length) {
      const t = setTimeout(()=> setCharIndex(c=>c+1), typingSpeed);
      return ()=>clearTimeout(t);
    }
    // finished current segment
    if(segIndex < segments.length - 1) {
      const t = setTimeout(()=> { setSegIndex(s=>s+1); setCharIndex(0); }, typingSpeed);
      return ()=>clearTimeout(t);
    }
    setIsComplete(true);
  },[hasStarted,segIndex,charIndex,isComplete,segments,typingSpeed,startDelay]);

  useEffect(()=>{
    if(!repeat || !isComplete) return;
    const t = setTimeout(()=>{ setSegIndex(0); setCharIndex(0); setIsComplete(false); }, restartDelay);
    return ()=>clearTimeout(t);
  },[isComplete,repeat,restartDelay]);

  return (
    <pre ref={containerRef} className={"font-mono leading-relaxed whitespace-pre-wrap "+className}>
      {segments.map((s,i)=>{
        if(i < segIndex) return <span key={i} className={s.className}>{s.text}</span>;
        if(i === segIndex) return <span key={i} className={s.className}>{s.text.slice(0, Math.max(0,charIndex))}</span>;
        return <span key={i} className={s.className}></span>;
      })}
      <span className="inline-block w-2 h-4 ml-0.5 align-middle bg-primary/80 animate-pulse rounded-sm" />
    </pre>
  );
}
